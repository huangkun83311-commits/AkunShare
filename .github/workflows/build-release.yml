name: Build AkunShare DEB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载你的代码
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 【关键步骤】安装 Theos 和 Clang 编译器
      - name: Setup Theos
        uses: kirb/deploy-theos@master
        with:
          version: latest

      # 3. 开始编译
      - name: Build Package
        run: |
          echo "🚀 Starting Build Process..."
          # 使用 rootless 方案编译，指定 arm64 架构
          make package THEOS_PACKAGE_SCHEME=rootless ARCHS="arm64"
          
      # 4. 上传生成的 .deb 包
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: AkunShare.deb
          path: packages/*.deb
          if-no-files-found: error
